<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Explorer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#" id="brandLink">🎨 Art Explorer</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <div class="d-flex flex-column flex-md-row gap-2 py-2 py-md-0">
          <button class="btn btn-outline-light btn-sm" id="searchNavBtn">🔍 Search</button>
          <button class="btn btn-outline-light btn-sm position-relative" id="favBtn">
            ❤ Favorites
            <span id="favCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== SEARCH VIEW ===== -->
  <div id="searchView" class="container py-4">

    <!-- Search form -->
    <div class="row g-2 mb-3">
      <div class="col-12 col-md">
        <input type="text" id="searchInput" class="form-control" placeholder="Search artworks, artists, periods…">
      </div>
      <div class="col-12 col-md-auto">
        <select id="sourceFilter" class="form-select w-100">
          <option value="both">Both</option>
          <option value="met">Met Museum</option>
          <option value="harvard">Harvard</option>
        </select>
      </div>
      <div class="col-12 col-md-auto">
        <button id="searchBtn" class="btn btn-primary w-100">Search</button>
      </div>
    </div>
    <div class="mb-3">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="hasImageFilter">
        <label class="form-check-label" for="hasImageFilter">Only show artworks with images</label>
      </div>
    </div>

    <!-- Results count -->
    <p id="resultsCount" class="fw-bold d-none mb-3"></p>

    <!-- Empty / error state -->
    <div id="emptyState" class="text-center py-5 text-muted">
      <p class="fs-5">Search for artworks above to get started.</p>
    </div>

    <!-- Results grid -->
    <div id="resultsGrid" class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4"></div>

    <!-- Pagination -->
    <div id="pagination" class="d-none d-flex justify-content-center align-items-center gap-3 mt-4">
      <button id="prevBtn" class="btn btn-outline-primary">← Previous</button>
      <span id="pageIndicator" class="fw-semibold">Page 1 of 1</span>
      <button id="nextBtn" class="btn btn-outline-primary">Next →</button>
    </div>

  </div>

  <!-- ===== DETAIL VIEW ===== -->
  <div id="detailView" class="container py-4 d-none">

    <button id="backBtn" class="btn btn-secondary mb-4">← Back to Results</button>

    <div class="row g-4">

      <!-- Left column: image + favorites -->
      <div class="col-md-5">
        <div id="artworkPanel"></div>
      </div>

      <!-- Right column: persistent header + tabs -->
      <div class="col-md-7">
        <div id="artworkHeader" class="mb-3">
          <h2 id="artworkTitle" class="mb-1"></h2>
          <p id="artworkArtist" class="text-muted fs-5 mb-0"></p>
        </div>

        <!-- Bootstrap 5 Tabs -->
        <ul class="nav nav-tabs" id="detailTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-overview" data-bs-toggle="tab" data-bs-target="#tabOverview" type="button" role="tab">Overview</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-biography" data-bs-toggle="tab" data-bs-target="#tabBiography" type="button" role="tab">Biography</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-related" data-bs-toggle="tab" data-bs-target="#tabRelated" type="button" role="tab">Related Works</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-location" data-bs-toggle="tab" data-bs-target="#tabLocation" type="button" role="tab">Location</button>
          </li>
        </ul>

        <div class="tab-content border border-top-0 rounded-bottom bg-white p-4">
          <div class="tab-pane fade show active" id="tabOverview" role="tabpanel"></div>
          <div class="tab-pane fade" id="tabBiography" role="tabpanel"></div>
          <div class="tab-pane fade" id="tabRelated" role="tabpanel"></div>
          <div class="tab-pane fade" id="tabLocation" role="tabpanel">
            <div id="mapInfo" class="mb-3"></div>
            <div id="map" style="height: 300px;"></div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- ===== FAVORITES VIEW ===== -->
  <div id="favoritesView" class="container py-4 d-none">
    <h2 class="mb-4">❤ Favorites</h2>
    <div id="favEmptyState" class="d-none" style="height:60vh;">
      <div class="h-100 d-flex flex-column align-items-center justify-content-center">
        <p class="text-muted fs-5 mb-0">No favorites saved yet.</p>
        <p class="text-muted small">Search for artworks and add them!</p>
      </div>
    </div>
    <div id="favoritesGrid" class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
  </div>

  <!-- Cursor tooltip for related works -->
  <div id="relatedTooltip" class="d-none"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
